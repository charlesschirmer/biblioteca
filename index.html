<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Líder Leitor — Acervo Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #141414;
  --surface:   #1e1e1e;
  --card:      #1e1e1e;
  --border:    #2e2e2e;
  --border-hi: #3d3d3d;
  --gold:      #e8a020;
  --gold-light:#f5c842;
  --gold-dim:  rgba(232,160,32,0.12);
  --gold-glow: rgba(232,160,32,0.25);
  --text:      #f0ece4;
  --muted:     #8a8070;
  --light:     #5a5248;
  --white:     #ffffff;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.5);
  --shadow-lg: 0 12px 48px rgba(0,0,0,0.6);
  --shadow-gold: 0 6px 24px rgba(232,160,32,0.3);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ══ NAVBAR ══ */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 56px;
  background: rgba(14,14,14,0.95);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 2.5rem; gap: 2rem;
}

.nav-logo {
  font-family: 'Syne', sans-serif;
  font-size: 1rem; font-weight: 800;
  color: var(--gold);
  white-space: nowrap;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.nav-logo span { color: var(--text); font-weight: 400; }

.nav-search {
  flex: 1; max-width: 480px; position: relative;
}
.nav-search svg {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--muted); pointer-events: none;
}
#search {
  width: 100%;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px 8px 38px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 0.875rem; color: var(--text);
  outline: none; transition: border-color .2s, box-shadow .2s;
}
#search:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px var(--gold-dim);
}
#search::placeholder { color: var(--light); }

.nav-right {
  margin-left: auto;
  display: flex; align-items: center; gap: 1rem;
}
.nav-count {
  font-size: 0.78rem; color: var(--muted);
  background: var(--surface); border: 1px solid var(--border);
  padding: 4px 12px; border-radius: 20px; white-space: nowrap;
}
.nav-count strong { color: var(--gold); font-weight: 600; }

.view-toggle {
  display: flex; gap: 2px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 3px;
}
.view-toggle button {
  background: none; border: none; cursor: pointer;
  padding: 5px 8px; border-radius: 5px;
  color: var(--muted); transition: all .15s;
  display: flex; align-items: center;
}
.view-toggle button.active { background: var(--gold); color: #000; }

/* ══ HERO — banner da arte ══ */
.hero {
  margin-top: 56px;
  position: relative;
  width: 100%;
  overflow: hidden;
  background: #0a0a0a;
}

.hero-banner {
  width: 100%;
  display: block;
  max-height: 340px;
  object-fit: cover;
  object-position: center;
}

/* Overlay sutil embaixo para transição suave para o fundo */
.hero-fade {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 80px;
  background: linear-gradient(to bottom, transparent, var(--bg));
  pointer-events: none;
}

/* Faixa de stats sobre o banner */
.hero-stats-bar {
  position: absolute; bottom: 16px; left: 0; right: 0;
  display: flex; justify-content: center; gap: 2rem;
  z-index: 2; pointer-events: none;
}
.hero-stat {
  text-align: center;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(232,160,32,0.3);
  border-radius: 10px;
  padding: 8px 24px;
}
.hero-stat .num {
  font-family: 'Syne', sans-serif;
  font-size: 1.5rem; font-weight: 800;
  color: var(--gold); line-height: 1;
}
.hero-stat .lbl {
  font-size: 0.68rem; color: rgba(255,255,255,0.5);
  letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px;
}

/* ══ FILTROS ══ */
.filters-section {
  max-width: 1360px; margin: 0 auto;
  padding: 1.5rem 2.5rem 0;
  display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
}
.filters-label {
  font-size: 0.72rem; font-weight: 600; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap;
}
.filters-bar { display: flex; gap: .4rem; flex-wrap: wrap; flex: 1; }
.filter-btn {
  background: var(--surface); border: 1.5px solid var(--border);
  color: var(--muted); cursor: pointer;
  padding: 5px 15px; border-radius: 6px;
  font-family: 'IBM Plex Sans', sans-serif; font-size: 0.78rem; font-weight: 500;
  transition: all .15s; white-space: nowrap;
}
.filter-btn:hover { border-color: var(--gold); color: var(--gold-light); }
.filter-btn.active {
  background: var(--gold); border-color: var(--gold);
  color: #000; font-weight: 600;
  box-shadow: var(--shadow-gold);
}

/* ══ SECTION HEADER ══ */
.page-wrap { max-width: 1360px; margin: 0 auto; padding: 0 2.5rem; }

.section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.5rem 0 1.25rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 1.75rem;
}
.section-title {
  font-family: 'Syne', sans-serif;
  font-size: 1rem; font-weight: 700; color: var(--text);
  letter-spacing: 0.01em;
}
.section-count {
  font-size: 0.75rem; color: var(--muted);
  background: var(--surface); border: 1px solid var(--border);
  padding: 3px 10px; border-radius: 20px;
}

/* ══ GRID ══ */
.books-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
  gap: 1.5rem;
  padding-bottom: 4rem;
}

.book-card {
  cursor: pointer;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 12px; overflow: hidden;
  transition: transform .2s cubic-bezier(.34,1.56,.64,1), border-color .2s, box-shadow .2s;
  position: relative; box-shadow: var(--shadow-sm);
  opacity: 0;
  animation: cardIn .4s ease forwards;
}
.book-card:hover {
  transform: translateY(-6px) scale(1.01);
  border-color: var(--gold);
  box-shadow: var(--shadow-lg), 0 0 0 3px var(--gold-dim);
}
@keyframes cardIn {
  from { opacity:0; transform: translateY(14px); }
  to   { opacity:1; transform: translateY(0); }
}

.book-cover {
  width: 100%; aspect-ratio: 2/3;
  background: #111; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.book-cover img {
  width:100%; height:100%; object-fit:cover;
  transition: transform .3s;
}
.book-card:hover .book-cover img { transform: scale(1.05); }

.cover-placeholder {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; padding: 1.25rem;
  text-align: center; position: absolute; inset: 0;
}
.cover-placeholder .cover-icon { font-size: 2.8rem; }
.cover-placeholder .cover-title {
  font-family: 'Syne', sans-serif;
  font-size: 0.7rem; font-weight: 600;
  color: var(--text); line-height: 1.3; opacity: .7;
}

.book-stripe { position: absolute; top: 0; left: 0; right: 0; height: 3px; }

.book-info { padding: 12px 14px 14px; }
.book-title {
  font-family: 'Syne', sans-serif;
  font-size: 0.84rem; font-weight: 700;
  line-height: 1.3; margin-bottom: 4px; color: var(--text);
  display: -webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.book-author { font-size: 0.72rem; color: var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.book-cat {
  display: inline-block; margin-top: 8px;
  font-size: 0.62rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 4px;
  background: var(--gold-dim); color: var(--gold);
  border: 1px solid rgba(232,160,32,0.2);
}

.book-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .2s; border-radius: 12px;
}
.book-card:hover .book-overlay { opacity: 1; }
.overlay-btn {
  background: var(--gold); color: #000;
  font-family: 'IBM Plex Sans', sans-serif;
  font-weight: 700; font-size: 0.82rem;
  padding: 9px 24px; border-radius: 8px;
  letter-spacing: 0.04em;
  box-shadow: var(--shadow-gold);
  transform: translateY(8px); transition: transform .2s;
}
.book-card:hover .overlay-btn { transform: translateY(0); }

/* ══ LIST VIEW ══ */
.books-list { display:none; flex-direction:column; gap:.5rem; padding-bottom:4rem; }
.list-item {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 10px; padding: .9rem 1.25rem;
  display:flex; align-items:center; gap:1.25rem;
  cursor:pointer; transition: border-color .15s, box-shadow .15s;
  box-shadow: var(--shadow-sm);
}
.list-item:hover { border-color: var(--gold); box-shadow: var(--shadow-md), 0 0 0 3px var(--gold-dim); }
.list-icon {
  width:44px; height:58px; flex-shrink:0;
  border-radius:6px; display:flex; align-items:center; justify-content:center;
  font-size:1.4rem; overflow:hidden;
}
.list-icon img { width:100%; height:100%; object-fit:cover; }
.list-meta { flex:1; min-width:0; }
.list-title {
  font-family:'Syne',sans-serif;
  font-size:.9rem; font-weight:700; color:var(--text);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.list-author { font-size:.78rem; color:var(--muted); margin-top:2px; }
.list-right { display:flex; align-items:center; gap:.75rem; flex-shrink:0; }
.list-cat {
  font-size:.65rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase;
  padding:3px 10px; border-radius:4px;
  background:var(--gold-dim); color:var(--gold);
  border:1px solid rgba(232,160,32,0.2);
}
.list-open-btn {
  background: var(--gold); color: #000; border: none;
  padding: 7px 16px; border-radius: 7px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: .78rem; font-weight: 700; cursor: pointer;
  transition: opacity .15s; text-decoration: none; white-space: nowrap;
}
.list-open-btn:hover { opacity:.85; }

/* ══ EMPTY ══ */
.empty-state { text-align:center; padding:5rem 2rem; color:var(--muted); display:none; }
.empty-state .icon { font-size:3rem; margin-bottom:1rem; }
.empty-state h3 { font-family:'Syne',sans-serif; color:var(--text); margin-bottom:.5rem; }

/* ══ MODAL ══ */
.modal-overlay {
  position:fixed; inset:0; z-index:300;
  background:rgba(0,0,0,0.8); backdrop-filter:blur(8px);
  display:none; align-items:center; justify-content:center; padding:1rem;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--surface); border:1.5px solid var(--border-hi);
  border-radius:16px; width:100%; max-width:540px;
  box-shadow:var(--shadow-lg);
  animation:modalIn .25s cubic-bezier(.34,1.36,.64,1);
  overflow:hidden;
}
@keyframes modalIn {
  from { opacity:0; transform:translateY(20px) scale(.96); }
  to   { opacity:1; transform:none; }
}
.modal-header {
  background: linear-gradient(135deg, #0a0a0a 0%, #1a1208 50%, #221a06 100%);
  border-bottom: 1px solid var(--border);
  padding:1.5rem; display:flex; gap:1.25rem; align-items:flex-start; position:relative;
}
/* linha dourada topo do modal */
.modal-header::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
}
.modal-close {
  position:absolute; top:1rem; right:1rem;
  background:rgba(255,255,255,0.08); border:none; cursor:pointer;
  color:var(--text); width:28px; height:28px; border-radius:50%;
  font-size:.9rem; display:flex; align-items:center; justify-content:center;
  transition:background .15s;
}
.modal-close:hover { background:rgba(255,255,255,0.16); }
.modal-cover-wrap {
  width:80px; height:110px; flex-shrink:0;
  border-radius:8px; overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,0.6);
  background:rgba(255,255,255,0.05);
  display:flex; align-items:center; justify-content:center; font-size:2rem;
}
.modal-cover-wrap img { width:100%; height:100%; object-fit:cover; }
.modal-header-info { flex:1; min-width:0; }
.modal-cat-badge {
  display:inline-block;
  font-size:.65rem; font-weight:600; letter-spacing:.12em; text-transform:uppercase;
  padding:3px 10px; border-radius:4px;
  background:var(--gold-dim); color:var(--gold);
  border:1px solid rgba(232,160,32,0.3);
  margin-bottom:.6rem;
}
.modal-title {
  font-family:'Syne',sans-serif;
  font-size:1.1rem; font-weight:800; color:var(--text);
  line-height:1.25; margin-bottom:.35rem; letter-spacing:-0.01em;
}
.modal-author { font-size:.82rem; color:var(--muted); }
.modal-body { padding:1.5rem; }
.modal-desc {
  font-size:.875rem; color:var(--muted); line-height:1.7;
  margin-bottom:1.5rem; min-height:48px;
}
.btn-primary {
  display:block; width:100%;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color:#000; border:none; border-radius:9px; padding:12px 20px;
  font-family:'IBM Plex Sans',sans-serif; font-weight:700; font-size:.9rem;
  cursor:pointer; text-decoration:none; text-align:center;
  transition:opacity .15s, transform .15s;
  box-shadow:var(--shadow-gold); letter-spacing:.03em;
}
.btn-primary:hover { opacity:.9; transform:translateY(-1px); }

/* ══ FOOTER ══ */
footer {
  border-top:1px solid var(--border);
  text-align:center; padding:2rem;
  font-size:.75rem; color:var(--light);
}
footer a { color:var(--gold); text-decoration:none; }

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border-hi); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--gold); }

/* ══ RESPONSIVE ══ */
@media (max-width:640px) {
  nav { padding:0 1rem; gap:1rem; }
  .filters-section, .page-wrap { padding-left:1rem; padding-right:1rem; }
  .books-grid { grid-template-columns:repeat(auto-fill,minmax(148px,1fr)); gap:1rem; }
  .list-right .list-cat { display:none; }
  .hero-stats-bar { gap:1rem; }
  .hero-stat { padding:6px 16px; }
}

body.list-mode .books-grid { display:none; }
body.list-mode .books-list  { display:flex; }
</style>
</head>
<body>

<!-- ══ NAVBAR ══ -->
<nav>
  <div class="nav-logo">Líder <span>Leitor</span></div>

  <div class="nav-search">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

    </svg>
    <input type="text" id="search" placeholder="Buscar título, autor ou categoria…">

          <rect x="3" y="14" width="7" height="7" rx="1.5"/>
          <rect x="14" y="14" width="7" height="7" rx="1.5"/>
        </svg>
      </button>
      <button id="btn-list" title="Lista" onclick="setView('list')">

          <line x1="8" y1="6" x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <circle cx="3.5" cy="6" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="3.5" cy="12" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="3.5" cy="18" r="1.5" fill="currentColor" stroke="none"/>
        </svg>
      </button>
    </div>
  </div>
</nav>

  const cats = [...new Set(catalogo.map(b => b.categoria).filter(Boolean))].sort();
  const bar = document.getElementById('filters-bar');
  bar.innerHTML = `<button class="filter-btn active" data-cat="all" onclick="setFilter('all',this)">Todos</button>`;
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn'; btn.dataset.cat = cat; btn.textContent = cat;
    btn.onclick = () => setFilter(cat, btn);
    bar.appendChild(btn);
  });
}

function setFilter(cat, el) {
  filtroAtivo = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active'); render();
}

function filtered() {
  return catalogo.filter(b => {
    const matchCat = filtroAtivo === 'all' || b.categoria === filtroAtivo;
    const q = buscaAtiva.toLowerCase();
    const matchSearch = !q ||
      (b.titulo||'').toLowerCase().includes(q) ||
      (b.autor||'').toLowerCase().includes(q) ||
      (b.categoria||'').toLowerCase().includes(q) ||
      (b.descricao||'').toLowerCase().includes(q);
    return matchCat && matchSearch;
  });
}

function render() {
  const books = filtered();
  const label = document.getElementById('section-label');
  const countEl = document.getElementById('section-count');
  if (buscaAtiva) label.textContent = `Resultados para "${buscaAtiva}"`;
  else if (filtroAtivo !== 'all') label.textContent = filtroAtivo;
  else label.textContent = 'Todos os documentos';
  countEl.textContent = `${books.length} ${books.length === 1 ? 'item' : 'itens'}`;
  document.getElementById('empty-state').style.display = books.length ? 'none' : 'block';
  renderGrid(books); renderList(books);
}

function coverHtml(book) {
  if (book.capa) return `<img src="${book.capa}" alt="${book.titulo}" onerror="this.style.display='none'">`;
  const bg = hexToRgba(book.cor || '#e8a020', 0.1);
  return `<div class="cover-placeholder" style="background:${bg}">
    <div class="cover-icon">${categoryEmoji(book.categoria)}</div>
    <div class="cover-title">${book.titulo}</div>
  </div>`;
}

function renderGrid(books) {
  document.getElementById('books-grid').innerHTML = books.map((b, i) => `
    <div class="book-card" onclick="openModal(${i})" style="animation-delay:${i*35}ms">
      <div class="book-stripe" style="background:linear-gradient(90deg,${b.cor||'#e8a020'},${b.cor||'#e8a020'}aa)"></div>
      <div class="book-cover">${coverHtml(b)}</div>
      <div class="book-info">
        <div class="book-title">${b.titulo}</div>
        <div class="book-author">${b.autor||'—'}</div>
        ${b.categoria?`<span class="book-cat">${b.categoria}</span>`:''}
      </div>
      <div class="book-overlay"><div class="overlay-btn">Abrir</div></div>
    </div>`).join('');
}

function renderList(books) {
  const list = document.getElementById('books-list');
  list.innerHTML = books.map((b, i) => `
    <div class="list-item">
      <div class="list-icon" style="background:${hexToRgba(b.cor||'#e8a020',0.1)}">
        ${b.capa ? `<img src="${b.capa}" alt="${b.titulo}">` : categoryEmoji(b.categoria)}
      </div>
      <div class="list-meta">
        <div class="list-title">${b.titulo}</div>
        <div class="list-author">${b.autor||'—'}</div>
      </div>
      <div class="list-right">
        ${b.categoria?`<span class="list-cat">${b.categoria}</span>`:''}
        <a class="list-open-btn" href="${b.arquivo}" target="_blank" onclick="event.stopPropagation()">Abrir PDF</a>
      </div>
    </div>`).join('');
  list.querySelectorAll('.list-item').forEach((el,idx) => el.onclick = () => openModal(idx));
}

function openModal(idx) {
  const books = filtered();
  const b = books[idx]; if (!b) return;
  document.getElementById('modal-title').textContent  = b.titulo;
  document.getElementById('modal-author').textContent = b.autor || 'Autor desconhecido';
  document.getElementById('modal-cat').textContent    = b.categoria || '';
  document.getElementById('modal-desc').textContent   = b.descricao || 'Sem descrição disponível.';
  document.getElementById('modal-read').href          = b.arquivo;
  const coverEl = document.getElementById('modal-cover');
  if (b.capa) {
    coverEl.innerHTML = `<img src="${b.capa}" alt="${b.titulo}">`;
  } else {
    coverEl.style.background = hexToRgba(b.cor||'#e8a020', 0.15);
    coverEl.innerHTML = `<span>${categoryEmoji(b.categoria)}</span>`;
  }
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function setView(mode) {
  const isList = mode === 'list';
  document.body.classList.toggle('list-mode', isList);
  document.getElementById('btn-list').classList.toggle('active', isList);
  document.getElementById('btn-grid').classList.toggle('active', !isList);
}

document.getElementById('search').addEventListener('input', e => {
  buscaAtiva = e.target.value.trim(); render();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
  }
});

function categoryEmoji(cat) {
  const map = {'Literatura':'📖','Tecnologia':'💻','Gestão':'📊','Artigos':'📰',
    'Documentos':'📄','Direito':'⚖️','Medicina':'🏥','Engenharia':'🔧',
    'Ciências':'🔬','História':'🏛️','Filosofia':'💭','Economia':'📈',
    'Educação':'🎓','Arte':'🎨','Religião':'✝️'};
  return map[cat] || '📄';
}
function hexToRgba(hex, alpha) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

init();
</script>
</body>
</html>
